services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - promdata_local:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_EXPLORE_ENABLED: "false"
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: light
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/orglens-3layer-overview.json
      ORGLENS_PG_HOST: ${ORGLENS_PG_HOST:-host.docker.internal}
      ORGLENS_PG_PORT: ${ORGLENS_PG_PORT:-5432}
      ORGLENS_PG_DB: ${ORGLENS_PG_DB:-orglens}
      ORGLENS_PG_USER: ${ORGLENS_PG_USER:-orglens}
      ORGLENS_PG_PASSWORD: ${ORGLENS_PG_PASSWORD:-orglens}
    volumes:
      - grafanadata_local:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"

volumes:
  promdata_local:
  grafanadata_local:
